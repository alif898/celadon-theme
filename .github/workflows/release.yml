name: Release
on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.BYPASS_TOKEN }}

      - name: Sync version and changelog
        run: |
          FULL_TAG=${{ github.event.release.tag_name }}
          CLEAN_VERSION=${FULL_TAG#v}
          NOTES="${{ github.event.release.body }}"
          DATE=$(date +'%Y-%m-%d')
          
          echo "Processing Release: $FULL_TAG"
          
          CURRENT_VERSION=$(jq -r '.version' config.json | cut -d'+' -f1)
          if [ "$CLEAN_VERSION" != "$CURRENT_VERSION" ]; then
            echo "Updating config.json to $CLEAN_VERSION"
            jq ".version = \"$CLEAN_VERSION\"" config.json > config.json.tmp && mv config.json.tmp config.json
          fi
          
          if ! grep -q "## \[$FULL_TAG\]" CHANGELOG.md; then
            echo "Updating Changelog..."
            NEW_ENTRY="## [$FULL_TAG] - $DATE\n$NOTES\n"
            sed -i "0,/^# /s/^# .*/&\n\n$NEW_ENTRY/" CHANGELOG.md
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Generate theme files
        run: uv run celadon-theme

      - name: Run Python tests
        run: uv run pytest tests

      - name: Run mypy type checking
        run: uv run mypy src tests

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      - name: Verify JetBrains plugin
        working-directory: jetbrains
        run: |
          chmod +x gradlew
          ./gradlew verifyPlugin

      - name: Publish to JetBrains Marketplace
        working-directory: jetbrains
        run: |
          chmod +x gradlew
          ./gradlew publishPlugin
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}

      - name: Upload Zip to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} ./jetbrains/build/distributions/*.zip --clobber

      - name: Commit version and changelog back to Main
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json CHANGELOG.md
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "[skip ci]: ${{ github.event.release.tag_name }} release, sync version and changelog"
            git push origin main